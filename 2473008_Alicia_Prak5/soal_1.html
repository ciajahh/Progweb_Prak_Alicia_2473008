<!DOCTYPE html>
<html>

<head>
    <title>2473008-Alicia</title>
    <style>
        .star-container {
            display: inline-block;
            padding: 30px;
            position: relative;

            background-image:
                linear-gradient(#FF0000, #FF0000), linear-gradient(#FF0000, #FF0000),
                linear-gradient(#FF0000, #FF0000), linear-gradient(#FF0000, #FF0000),
                linear-gradient(#FF0000, #FF0000), linear-gradient(#FF0000, #FF0000),
                linear-gradient(#FF0000, #FF0000), linear-gradient(#FF0000, #FF0000);

            background-repeat: no-repeat;

            background-position:
                top left, top left,
                top right, top right,
                bottom left, bottom left,
                bottom right, bottom right;

            background-size:
                30px 4px, 4px 20px,
                30px 4px, 4px 20px,
                30px 4px, 4px 20px,
                30px 4px, 4px 20px;
        }

        .star-container:hover {
            background-image:
                linear-gradient(#FF00FF, #FF00FF), linear-gradient(#FF00FF, #FF00FF),
                linear-gradient(#FF00FF, #FF00FF), linear-gradient(#FF00FF, #FF00FF),
                linear-gradient(#FF00FF, #FF00FF), linear-gradient(#FF00FF, #FF00FF),
                linear-gradient(#FF00FF, #FF00FF), linear-gradient(#FF00FF, #FF00FF);
        }

        .star-container img {
            display: block;
            width: 150px;/
        }
    </style>
</head>

<body>

    <table border="0">
        <tr>
            <td>
                <a href="#" class="star-container">
                    <img src="src/star.jpg" alt="Star">
                </a>
            </td>
        </tr>
    </table>

</body>

</html>
