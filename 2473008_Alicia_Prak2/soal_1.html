<!DOCTYPE html>
<html>
<head>
    <title>Tabel Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            height: 400px;
            text-align: center;
            font-weight: bold;
            color: white;
        }
        td {
            border: 2px solid black;
        }
        .blue { background-color: blue; }
        .yellow { background-color: yellow; color: black; }
        .red { background-color: red; }
        .green { background-color: limegreen; color: black; }
        .black { background-color: black; }
    </style>
</head>
<body>

<table align="center">
    <tr>
        <td colspan="4" class="blue">A</td>
        <td rowspan="4" class="yellow">D</td>
    </tr>
    <tr>
        <td rowspan="4" class="yellow">G</td>
        <td colspan="2" class="red">B</td>
        <td rowspan="2" class="green">C</td>
    </tr>
    <tr>
        <td rowspan="2" class="green">F</td>
        <td class="black">X</td>
    </tr>
    <tr>
        <td colspan="2" class="red">E</td>
    </tr>
    <tr>
        <td colspan="5" class="blue">H</td>
    </tr>
</table>

</body>
</html>
