<!DOCTYPE html>
<html>

<head>
    <title>2473008-Alicia</title>
    <style type="text/css">
        body {
            background-color: #8c0000;
            font-family: "Times New Roman", Times, serif;
            padding: 20px;
        }

        .rounded-box {
            width: 230px;
            color: white;
        }

        .box-t {
            background: url('img/box_t.gif') repeat-x top;
        }

        .box-tr {
            background: url('img/box_tr.gif') no-repeat top right;
        }

        .box-tl {
            background: url('img/box_tl.gif') no-repeat top left;
            height: 13px;
        }

        .box-l {
            background: #750000 url('img/box_l.gif') repeat-y left;
        }

        .box-r {
            background: url('img/box_r.gif') repeat-y right;
        }

        .content {
            padding: 5px 20px;
        }

        .box-b {
            background: url('img/box_b.gif') repeat-x bottom;
        }

        .box-br {
            background: url('img/box_br.gif') no-repeat bottom right;
        }

        .box-bl {
            background: url('img/box_bl.gif') no-repeat bottom left;
            height: 13px;
        }

        h3 {
            margin-top: 0;
            font-family: "Times New Roman", Times, serif;
        }

        p {
            line-height: 1.4;
            font-size: 16px;
        }

        .posisi-kanan {
            text-align: right;
        }

        a.link-more:link,
        a.link-more:visited {
            color: #ffcc00;
            text-decoration: none;
        }

        a.link-more:hover {
            color: green;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="rounded-box">
        <div class="box-t">
            <div class="box-tr">
                <div class="box-tl"></div>
            </div>
        </div>

        <div class="box-l">
            <div class="box-r">
                <div class="content">
                    <h3>12.02.2011</h3>
                    <p>Satu per satu para pesaing Manchester United mulai menunjukkan tanda-tanda "menyerah". Kini
                        tinggal..</p>
                    <div class="posisi-kanan">
                        <a href="#" class="link-more">more</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="box-b">
            <div class="box-br">
                <div class="box-bl"></div>
            </div>
        </div>
    </div>

</body>

</html>
